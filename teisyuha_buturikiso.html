<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプル低周波発振器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #b8ccd8;
      min-height: 100vh;
    }

    /* 周波数パネル */
    .freq-panel {
      background: #1a2535;
      border-radius: 10px;
      padding: 10px 16px;
      text-align: center;
    }
    .freq-int {
      font-family: 'Courier New', monospace;
      font-size: 2.4rem;
      font-weight: bold;
      color: #4ade80;
      letter-spacing: 0.1em;
    }
    .freq-dot {
      font-family: 'Courier New', monospace;
      font-size: 2rem;
      font-weight: bold;
      color: #94a3b8;
      margin: 0 2px;
    }
    .freq-dec {
      font-family: 'Courier New', monospace;
      font-size: 2.4rem;
      font-weight: bold;
      color: #86efac;
      letter-spacing: 0.1em;
    }
    .freq-unit {
      font-size: 1rem;
      color: #64748b;
      margin-left: 8px;
    }

    /* 桁グリッド（行ベース） */
    .digit-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .digit-row + .digit-row {
      margin-top: 3px;
    }
    .cell {
      flex: 1;
      min-width: 0;
    }
    .dec-sep {
      flex: 0 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ラベル */
    .digit-label {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #64748b;
      padding: 2px 0;
    }

    /* 桁表示 */
    .digit-display {
      width: 100%;
      font-size: 2rem;
      font-weight: bold;
      font-family: monospace;
      text-align: center;
      background: #f8fafc;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 0;
      line-height: 1.2;
    }

    /* 小数点ドット */
    .dot {
      width: 10px;
      height: 10px;
      background: #334155;
      border-radius: 50%;
    }

    /* 桁ボタン */
    .freq-btn {
      width: 100%;
      padding: 9px 0;
      font-size: 1rem;
      touch-action: manipulation;
    }

    /* 再生/停止ボタン */
    .play-btn {
      font-size: 1.25rem;
      padding: 13px 52px;
      touch-action: manipulation;
      min-width: 180px;
    }

    @media (max-width: 390px) {
      .freq-int, .freq-dec { font-size: 1.7rem; letter-spacing: 0.05em; }
      .freq-dot            { font-size: 1.4rem; }
      .digit-display       { font-size: 1.45rem; }
      .freq-btn            { font-size: 0.85rem; padding: 7px 0; }
      .digit-label         { font-size: 0.6rem; }
      .digit-row           { gap: 3px; }
      .dec-sep             { flex: 0 0 10px; }
      .dot                 { width: 7px; height: 7px; }
    }
  </style>
</head>
<body>
  <div class="container py-3" style="max-width: 520px;">
    <div class="card shadow rounded-3">
      <div class="card-body px-3 py-4">

        <h1 class="text-center mb-3 fw-bold" style="font-size: 1.25rem; color: #1a2535;">
          シンプル低周波発振器
        </h1>

        <!-- 周波数パネル -->
        <div class="freq-panel mb-3">
          <span id="freq-int" class="freq-int">00050</span><span class="freq-dot">.</span><span id="freq-dec" class="freq-dec">0</span>
          <span class="freq-unit">Hz</span>
        </div>

        <!-- 桁グリッド -->

        <!-- ラベル行 -->
        <div class="digit-row mt-2">
          <div class="cell digit-label">万</div>
          <div class="cell digit-label">千</div>
          <div class="cell digit-label">百</div>
          <div class="cell digit-label">十</div>
          <div class="cell digit-label">一</div>
          <div class="dec-sep"></div>
          <div class="cell digit-label">.1</div>
        </div>

        <!-- 上ボタン行 -->
        <div class="digit-row">
          <div class="cell"><button id="up5" class="btn btn-primary freq-btn"><i class="bi bi-caret-up-fill"></i></button></div>
          <div class="cell"><button id="up4" class="btn btn-primary freq-btn"><i class="bi bi-caret-up-fill"></i></button></div>
          <div class="cell"><button id="up3" class="btn btn-primary freq-btn"><i class="bi bi-caret-up-fill"></i></button></div>
          <div class="cell"><button id="up2" class="btn btn-primary freq-btn"><i class="bi bi-caret-up-fill"></i></button></div>
          <div class="cell"><button id="up1" class="btn btn-primary freq-btn"><i class="bi bi-caret-up-fill"></i></button></div>
          <div class="dec-sep"></div>
          <div class="cell"><button id="up0" class="btn btn-primary freq-btn"><i class="bi bi-caret-up-fill"></i></button></div>
        </div>

        <!-- 数字行（小数点ドット付き） -->
        <div class="digit-row">
          <div class="cell"><div id="display5" class="digit-display">0</div></div>
          <div class="cell"><div id="display4" class="digit-display">0</div></div>
          <div class="cell"><div id="display3" class="digit-display">0</div></div>
          <div class="cell"><div id="display2" class="digit-display">5</div></div>
          <div class="cell"><div id="display1" class="digit-display">0</div></div>
          <div class="dec-sep"><div class="dot"></div></div>
          <div class="cell"><div id="display0" class="digit-display">0</div></div>
        </div>

        <!-- 下ボタン行 -->
        <div class="digit-row mb-4">
          <div class="cell"><button id="down5" class="btn btn-primary freq-btn"><i class="bi bi-caret-down-fill"></i></button></div>
          <div class="cell"><button id="down4" class="btn btn-primary freq-btn"><i class="bi bi-caret-down-fill"></i></button></div>
          <div class="cell"><button id="down3" class="btn btn-primary freq-btn"><i class="bi bi-caret-down-fill"></i></button></div>
          <div class="cell"><button id="down2" class="btn btn-primary freq-btn"><i class="bi bi-caret-down-fill"></i></button></div>
          <div class="cell"><button id="down1" class="btn btn-primary freq-btn"><i class="bi bi-caret-down-fill"></i></button></div>
          <div class="dec-sep"></div>
          <div class="cell"><button id="down0" class="btn btn-primary freq-btn"><i class="bi bi-caret-down-fill"></i></button></div>
        </div>

        <!-- スライダー -->
        <div class="mb-4">
          <div class="d-flex justify-content-between small text-muted mb-1">
            <span>1 Hz</span>
            <span>20,000 Hz</span>
          </div>
          <input type="range" class="form-range" id="freqSlider" min="1.0" max="20000.0" step="0.1" value="50.0">
        </div>

        <!-- 再生/停止ボタン -->
        <div class="text-center mb-2">
          <button id="playBtn" class="btn btn-success play-btn rounded-pill">
            <i class="bi bi-play-fill"></i>&nbsp;再生
          </button>
        </div>

        <div class="text-end small text-muted mt-3">
          シンプル低周波発振器 © <a href="https://note.com/phys_ken" target="_blank">phys-ken</a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let audioContext;
      let oscillator = null;
      let gainNode = null;
      let isPlaying = false;
      let frequency = 50.0;
      const waveType = 'sine';

      const freqSlider = document.getElementById('freqSlider');
      const playBtn    = document.getElementById('playBtn');
      const freqInt    = document.getElementById('freq-int');
      const freqDec    = document.getElementById('freq-dec');

      const displayIds    = ['display5','display4','display3','display2','display1','display0'];
      const upButtonIds   = ['up5','up4','up3','up2','up1','up0'];
      const downButtonIds = ['down5','down4','down3','down2','down1','down0'];
      const multipliers   = [10000, 1000, 100, 10, 1, 0.1];

      const displayDigits = displayIds.map(id => document.getElementById(id));
      const upButtons     = upButtonIds.map(id => document.getElementById(id));
      const downButtons   = downButtonIds.map(id => document.getElementById(id));

      function initAudio() {
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          gainNode = audioContext.createGain();
          gainNode.gain.value = 1.0;
          gainNode.connect(audioContext.destination);
        } catch (e) {
          alert('お使いのブラウザはWeb Audio APIをサポートしていません。');
        }
      }

      function updateFrequencyDisplay() {
        const freqStr = frequency.toFixed(1);
        const [intPart, decPart] = freqStr.split('.');
        const paddedInt = intPart.padStart(5, '0');

        freqInt.textContent = paddedInt;
        freqDec.textContent = decPart;

        const chars = paddedInt + decPart;
        for (let i = 0; i < 6; i++) displayDigits[i].textContent = chars.charAt(i);

        freqSlider.value = frequency;
      }

      function updateOscillator() {
        if (oscillator) { oscillator.stop(); oscillator.disconnect(); }
        oscillator = audioContext.createOscillator();
        oscillator.type = waveType;
        oscillator.frequency.value = frequency;
        oscillator.connect(gainNode);
        oscillator.start();
      }

      function changeFrequency(position, delta) {
        let newFreq = Math.round((frequency + delta * multipliers[position]) * 10) / 10;
        if (newFreq < 1.0)     newFreq = 1.0;
        if (newFreq > 20000.0) newFreq = 20000.0;
        frequency = newFreq;
        updateFrequencyDisplay();
        if (isPlaying && oscillator) {
          oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
        }
      }

      function toggleSound() {
        if (!audioContext) initAudio();
        isPlaying = !isPlaying;
        if (isPlaying) {
          updateOscillator();
          playBtn.classList.replace('btn-success', 'btn-danger');
          playBtn.innerHTML = '<i class="bi bi-stop-fill"></i>&nbsp;停止';
        } else {
          if (oscillator) { oscillator.stop(); oscillator.disconnect(); oscillator = null; }
          playBtn.classList.replace('btn-danger', 'btn-success');
          playBtn.innerHTML = '<i class="bi bi-play-fill"></i>&nbsp;再生';
        }
      }

      upButtons.forEach((btn, i)   => btn.addEventListener('click', () => changeFrequency(i,  1)));
      downButtons.forEach((btn, i) => btn.addEventListener('click', () => changeFrequency(i, -1)));

      freqSlider.addEventListener('input', () => {
        frequency = Math.round(parseFloat(freqSlider.value) * 10) / 10;
        updateFrequencyDisplay();
        if (isPlaying && oscillator) {
          oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
        }
      });

      playBtn.addEventListener('click', toggleSound);

      document.addEventListener('touchstart', (e) => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
      document.addEventListener('dblclick', (e) => e.preventDefault(), { passive: false });

      updateFrequencyDisplay();
    });
  </script>
</body>
</html>
